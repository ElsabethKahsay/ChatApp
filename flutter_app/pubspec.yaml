name: securechat
description: Secure ephemeral chat with E2E encryption.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Networking ─────────────────────────────────────────────────
  socket_io_client: ^2.0.3+1
  http: ^1.2.1
  dio: ^5.4.3

  # ── Encryption ─────────────────────────────────────────────────
  cryptography: ^2.7.0        # X25519 ECDH + AES-256-GCM (pure Dart)

  # ── Storage ────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2   # Keychain (iOS) / Keystore (Android)
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3                   # SQLite for local message storage

  # ── Push Notifications ─────────────────────────────────────────
  firebase_messaging: ^15.0.4       # FCM for push notifications
  firebase_core: ^3.4.0

  # ── Media ──────────────────────────────────────────────────────
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── UI helpers ─────────────────────────────────────────────────
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.2
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
