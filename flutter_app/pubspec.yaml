name: securechat
description: Secure ephemeral chat with E2E encryption.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  socket_io_client: ^3.0.0
  http: ^1.2.1
  dio: ^5.4.3
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3
  firebase_messaging: ^15.0.4
  firebase_core: ^3.4.0
  record: ^5.1.0
  just_audio: ^0.10.5
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.2
  cached_network_image: ^3.3.1
  flutter_colorpicker: ^1.1.0
  confetti: ^0.8.0
  flutter_local_notifications: ^17.0.0
  share_plus: ^10.0.0
  permission_handler: ^11.3.1
  flutter_launcher_icons: ^0.13.1
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  record_linux: 1.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
